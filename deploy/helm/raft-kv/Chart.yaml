apiVersion: v2
name: raft-kv
description: A from-scratch Raft consensus key-value store, run as a StatefulSet.
# A consensus group is stateful: stable per-pod identity + per-pod storage are
# the whole point, so this chart deploys a StatefulSet (+ headless Service +
# per-pod PVCs), never a Deployment. See docs/design.md (StatefulSet section) for prose.
type: application
# Chart version — bump on chart changes. appVersion tracks the shipped image.
version: 0.1.2
appVersion: "0.1.0"
home: https://github.com/G1DO/raft-kv
sources:
  - https://github.com/G1DO/raft-kv
keywords:
  - raft
  - consensus
  - key-value
  - statefulset
