# Default values for the raft-kv chart. This chart is the single source of truth
# for the Kubernetes deploy. The defaults reproduce the 3-node StatefulSet
# verified on kind (leader-kill failover + PVC rejoin, 2026-05-30).

# Number of Raft members. The --peers list handed to every pod is regenerated
# from this value (see templates/_helpers.tpl "raft-kv.peers"), so scaling the
# cluster is a single-value change rather than a manual edit of the peer string.
#
# Run an ODD count (3, 5, 7) so a majority quorum is unambiguous. A consensus
# group is NOT a stateless service: more voters do not add throughput (every
# write still hits a majority), membership changes are deliberate one-at-a-time
# Raft config changes, and an HPA scale-down can destroy quorum — treat
# replicaCount as a deploy-time decision, not an autoscale target. No HPA
# template ships with this chart (see docs/design.md#reliability).
replicaCount: 3

# Binary upgrade path. RollingUpdate is the Kubernetes default; we set it
# explicitly so operators can pin a canary with rollingUpdate.partition.
# Updates proceed one pod at a time in reverse ordinal order and wait on the
# Ready gate (/readyz) — the PDB does not serialize rolls (eviction API only).
# Manual canary (N=3): bump image.tag with partition=2 → watch raft-kv-2 →
# partition=1 → partition=0. Argo Rollouts is parked (no native StatefulSet).
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    partition: 0

image:
  repository: raft-kv
  tag: dev
  # IfNotPresent suits a kind-loaded local image (never reach out to a registry
  # for a tag that is already on the node). Set to Always for a real registry.
  pullPolicy: IfNotPresent

# Client KV protocol (client), Raft peer RPC (raft), and HTTP metrics/health
# (metrics) ports. Changing any of these updates the container ports, the
# Service, the probes, the --metrics-addr arg, and the generated peers together
# — they cannot drift apart. metrics avoids 9090 (raft RPC) and 9100
# (node-exporter); it serves /metrics, /healthz, /readyz.
ports:
  client: 8080
  raft: 9090
  metrics: 2112

# Per-pod PersistentVolumeClaim holding the WAL + snapshots. Retained across
# reschedules so a pod rejoins with its history instead of as a blank node.
persistence:
  size: 256Mi
  # "" => the cluster's default StorageClass. Pin it for reproducibility.
  storageClassName: ""

# Container resources for a Raft voter (M7).
#
# - CPU: request only, NO limit. CFS throttling during elections/heartbeats
#   shows up as commit latency and can cascade into election storms.
# - Memory: request == limit → Guaranteed QoS on the dimension that OOM-kills.
#   An OOM during a rolling update can mean 2 down = quorum lost; PDBs cannot
#   stop OOM kills (voluntary-eviction only).
# - Sized for kind + light throughput bench. Raise memory (and gomemlimit
#   together) if snapshots grow — TakeSnapshot marshals the full KV state.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 128Mi

# Soft Go heap cap (~90% of memory limit). Without this, default GC can push
# RSS over the limit during snapshot marshal and the kubelet OOMKills the pod.
# Use Go's binary units (MiB), not Kubernetes' Mi.
gomemlimit: "115MiB"

# PodDisruptionBudget — voluntary disruptions only (kubectl drain, etc.).
# maxUnavailable:1 stays quorum-safe for any odd N ≥ 3. Prefer this over
# minAvailable:2, which at replicaCount:5 would allow 3 simultaneous evictions.
# The template fails install if maxUnavailable ≥ ceil(replicaCount/2).
# Does NOT cover OOM, node crash, liveness restarts, kubectl delete pod, or
# StatefulSet rolling updates (Ready gate serializes those).
pdb:
  enabled: true
  maxUnavailable: 1

# The binary traps SIGTERM and steps down (graceful leader handoff), so a short
# grace period is enough.
terminationGracePeriodSeconds: 10

# Pod-level security context. distroless :nonroot is uid/gid 65532; fsGroup
# chowns the mounted PVC so the non-root uid can write it.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

# Probes hit the metrics HTTP server (/healthz, /readyz) — not raw TCP ports.
#
# startup: /healthz answering means NewRaft finished (WAL replay is synchronous
# before startHTTPServer). Budget = failureThreshold × periodSeconds; raise the
# threshold for a genuinely fat WAL rather than guessing with liveness delays.
# Liveness is suspended until startup succeeds.
#
# liveness: dumb "HTTP loop answers". Must NOT call Ready() or take r.mu —
# restarting a healthy follower during slow snapshot/fsync is a quorum risk.
#
# readiness: /readyz → Raft.Ready(). Hysteresis (failureThreshold ≥ 3, period
# 1–2s) absorbs election blips when leaderID clears (~150–300ms).
startupProbe:
  periodSeconds: 2
  failureThreshold: 30 # 60s default boot budget
  timeoutSeconds: 1
livenessProbe:
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 1
readinessProbe:
  periodSeconds: 2
  failureThreshold: 3
  timeoutSeconds: 1

# Prometheus scrape discovery for the metrics port.
# serviceMonitor requires the Prometheus Operator CRDs (installed by the
# observability stack, deploy/observability) — enabling it without them makes
# install fail at CRD validation. The annotations fallback needs no CRDs but is
# only honored by Prometheus configs that scrape by pod annotation.
metrics:
  serviceMonitor:
    enabled: false
    # How often Prometheus scrapes each pod.
    interval: 15s
    # Extra labels on the ServiceMonitor object (some Prometheus installs select
    # ServiceMonitors by label, e.g. release: <kube-prometheus-stack release>).
    labels: {}
  # prometheus.io/* pod annotations as the no-CRD fallback.
  scrapeAnnotations:
    enabled: false

# Distributed tracing (ADR-007). Empty => tracing off, binary makes no
# telemetry connections. Set to an OTLP/HTTP host:port — with the observability
# stack installed that is Tempo's built-in receiver:
#   tempo.observability.svc.cluster.local:4318
tracing:
  otlpEndpoint: ""

# Peer mTLS paths and Secret mounts (ADR-009 / ADR-010). Default on: the chart
# always passes --raft-tls-{cert,key,ca} and expects one Secret per ordinal
# named {{ fullname }}-<N>-tls with keys tls.crt, tls.key, ca.crt (Phase B ESO
# or a lab script creates them). Missing Secrets => init fails => fail closed.
# enabled: false omits TLS flags (plaintext) — break-glass / tests only.
tls:
  enabled: true
  mountPath: /var/run/raft-kv/tls
  certFile: tls.crt
  keyFile: tls.key
  caFile: ca.crt
  # Copies this pod's Secret into an emptyDir so the main container does not
  # mount sibling ordinal Secrets (per-ordinal isolation).
  initImage: busybox:1.36

# Override the generated resource names. Empty => the chart's fullname helper
# (release name, collapsing to "raft-kv" for a release also named raft-kv).
nameOverride: ""
fullnameOverride: ""
