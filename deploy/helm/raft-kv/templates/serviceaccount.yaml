{{- if .Values.serviceAccount.create }}
{{- /*
Phase C #13 — Dedicated workload identity. No RBAC is bound to this account;
the StatefulSet sets automountServiceAccountToken: false so pods do not receive
a projected Kubernetes API token. Distinct from tls.eso vault auth SA (raft-kv-eso).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "raft-kv.serviceAccountName" . }}
  labels:
    {{- include "raft-kv.labels" . | nindent 4 }}
automountServiceAccountToken: false
{{- end }}
