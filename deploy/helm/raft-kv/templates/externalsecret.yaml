{{- /*
Phase B #7 — Declarative TLS Secret delivery via External Secrets Operator.

When tls.eso.enabled, emit one VaultDynamicSecret + ExternalSecret per ordinal.
ESO calls Vault PKI (issue), then materializes Secret {{ fullname }}-N-tls with
keys tls.crt / tls.key / ca.crt (ADR-009). No PEMs or Vault tokens in Git —
only path/role/server references from values.

Requires ESO CRDs in the cluster. Default tls.eso.enabled=false so kind/CI
without Vault still renders a plain chart.
*/ -}}
{{- if and .Values.tls.enabled .Values.tls.eso.enabled }}
{{- $fullname := include "raft-kv.fullname" . -}}
{{- $ns := .Release.Namespace -}}
{{- $server := required "tls.eso.vault.server is required when tls.eso.enabled=true" .Values.tls.eso.vault.server -}}
{{- $pkiPath := required "tls.eso.pki.path is required when tls.eso.enabled=true" .Values.tls.eso.pki.path -}}
{{- $role := required "tls.eso.vault.auth.role is required when tls.eso.enabled=true" .Values.tls.eso.vault.auth.role -}}
{{- $sa := required "tls.eso.vault.auth.serviceAccountName is required when tls.eso.enabled=true" .Values.tls.eso.vault.auth.serviceAccountName -}}
{{- range $i := until (int .Values.replicaCount) }}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: {{ $fullname }}-{{ $i }}-pki
  labels:
    {{- include "raft-kv.labels" $ | nindent 4 }}
    raft-kv.io/ordinal: {{ $i | quote }}
spec:
  path: {{ $pkiPath | quote }}
  method: POST
  resultType: Data
  parameters:
    common_name: {{ printf "%s-%d.%s" $fullname $i $fullname | quote }}
    alt_names: {{ printf "%s-%d.%s,%s-%d.%s.%s.svc,%s-%d.%s.%s.svc.cluster.local" $fullname $i $fullname $fullname $i $fullname $ns $fullname $i $fullname $ns | quote }}
    ttl: {{ $.Values.tls.eso.pki.ttl | quote }}
  provider:
    server: {{ $server | quote }}
    auth:
      kubernetes:
        mountPath: {{ $.Values.tls.eso.vault.auth.mountPath | quote }}
        role: {{ $role | quote }}
        serviceAccountRef:
          name: {{ $sa | quote }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $fullname }}-{{ $i }}-tls
  labels:
    {{- include "raft-kv.labels" $ | nindent 4 }}
    raft-kv.io/ordinal: {{ $i | quote }}
spec:
  refreshInterval: {{ $.Values.tls.eso.refreshInterval | quote }}
  target:
    name: {{ $fullname }}-{{ $i }}-tls
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      # Opaque (not kubernetes.io/tls): ADR-009 requires ca.crt alongside leaf material.
      data:
        tls.crt: {{ `{{ .certificate }}` | quote }}
        tls.key: {{ `{{ .private_key }}` | quote }}
        ca.crt: {{ `{{ .issuing_ca }}` | quote }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: {{ $fullname }}-{{ $i }}-pki
{{- end }}
{{- end }}
