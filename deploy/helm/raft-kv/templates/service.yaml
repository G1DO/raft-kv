apiVersion: v1
kind: Service
metadata:
  name: {{ include "raft-kv.fullname" . }}
  labels:
    {{- include "raft-kv.labels" . | nindent 4 }}
spec:
  clusterIP: None # headless => one DNS A record per pod: <fullname>-<n>.<fullname>
  selector:
    {{- include "raft-kv.labels" . | nindent 4 }}
  # Peers must resolve each other's DNS to hold the *first* election, which
  # happens before any pod is Ready. Without this, the cluster never bootstraps.
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: {{ .Values.ports.client }}
      targetPort: client
    - name: raft
      port: {{ .Values.ports.raft }}
      targetPort: raft
    - name: metrics
      port: {{ .Values.ports.metrics }}
      targetPort: metrics
