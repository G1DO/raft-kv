apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "raft-kv.fullname" . }}
  labels:
    {{- include "raft-kv.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "raft-kv.fullname" . }} # must equal the headless Service for stable per-pod DNS
  replicas: {{ .Values.replicaCount }}
  # Quorum needs the members up together; OrderedReady (the default) would block
  # pod-1 until pod-0 is Ready, but a lone pod-0 cannot reach quorum on its own.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "raft-kv.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "raft-kv.labels" . | nindent 8 }}
      {{- if .Values.metrics.scrapeAnnotations.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.ports.metrics | quote }}
        prometheus.io/path: /metrics
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: raft-kv
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- with .Values.gomemlimit }}
            - name: GOMEMLIMIT
              value: {{ . | quote }}
            {{- end }}
          # Every pod gets the SAME args. --id is the pod's stable name; --peers
          # is the whole-cluster list and the binary drops its own entry.
          args:
            - --id=$(POD_NAME)
            - --addr=0.0.0.0:{{ .Values.ports.client }}
            - --raft-addr=0.0.0.0:{{ .Values.ports.raft }}
            - --metrics-addr=0.0.0.0:{{ .Values.ports.metrics }}
            {{- with .Values.tracing.otlpEndpoint }}
            - --otlp-endpoint={{ . }}
            {{- end }}
            - --data=/data
            - --peers={{ include "raft-kv.peers" . }}
          ports:
            - name: client
              containerPort: {{ .Values.ports.client }}
            - name: raft
              containerPort: {{ .Values.ports.raft }}
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
          # /healthz = boot done / process alive (dumb). /readyz = Raft.Ready().
          startupProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
  # One PVC per pod, kept across reschedules — this is the "rejoins from its PVC"
  # half of the milestone.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
