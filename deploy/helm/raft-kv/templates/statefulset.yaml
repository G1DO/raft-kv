apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "raft-kv.fullname" . }}
  labels:
    {{- include "raft-kv.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "raft-kv.fullname" . }} # must equal the headless Service for stable per-pod DNS
  replicas: {{ .Values.replicaCount }}
  # Quorum needs the members up together; OrderedReady (the default) would block
  # pod-1 until pod-0 is Ready, but a lone pod-0 cannot reach quorum on its own.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "raft-kv.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "raft-kv.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: raft-kv
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          # Every pod gets the SAME args. --id is the pod's stable name; --peers
          # is the whole-cluster list and the binary drops its own entry.
          args:
            - --id=$(POD_NAME)
            - --addr=0.0.0.0:{{ .Values.ports.client }}
            - --raft-addr=0.0.0.0:{{ .Values.ports.raft }}
            - --data=/data
            - --peers={{ include "raft-kv.peers" . }}
          ports:
            - name: client
              containerPort: {{ .Values.ports.client }}
            - name: raft
              containerPort: {{ .Values.ports.raft }}
          # Raft RPC up => the process is alive; client port up => it is serving.
          livenessProbe:
            tcpSocket:
              port: raft
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
  # One PVC per pod, kept across reschedules — this is the "rejoins from its PVC"
  # half of the milestone.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
