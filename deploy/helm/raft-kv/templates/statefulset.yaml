apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "raft-kv.fullname" . }}
  labels:
    {{- include "raft-kv.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "raft-kv.fullname" . }} # must equal the headless Service for stable per-pod DNS
  replicas: {{ .Values.replicaCount }}
  # Quorum needs the members up together; OrderedReady (the default) would block
  # pod-1 until pod-0 is Ready, but a lone pod-0 cannot reach quorum on its own.
  podManagementPolicy: Parallel
  updateStrategy:
    type: {{ .Values.updateStrategy.type }}
    {{- if eq .Values.updateStrategy.type "RollingUpdate" }}
    rollingUpdate:
      partition: {{ .Values.updateStrategy.rollingUpdate.partition }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "raft-kv.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "raft-kv.labels" . | nindent 8 }}
      {{- if .Values.metrics.scrapeAnnotations.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.ports.metrics | quote }}
        prometheus.io/path: /metrics
      {{- end }}
    spec:
      serviceAccountName: {{ include "raft-kv.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.tls.enabled }}
      # Init mounts every ordinal's TLS Secret but only copies this pod's material
      # into an emptyDir; the main container never sees sibling private keys.
      initContainers:
        - name: select-tls
          image: {{ .Values.tls.initImage | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              SRC="/tls-in/${POD_NAME}"
              if [ ! -f "$SRC/{{ .Values.tls.certFile }}" ] || [ ! -f "$SRC/{{ .Values.tls.keyFile }}" ] || [ ! -f "$SRC/{{ .Values.tls.caFile }}" ]; then
                echo "raft-kv: missing TLS files for ${POD_NAME} (expected Secret {{ include "raft-kv.fullname" . }}-<ordinal>-tls)" >&2
                exit 1
              fi
              cp "$SRC/{{ .Values.tls.certFile }}" /tls-out/{{ .Values.tls.certFile }}
              cp "$SRC/{{ .Values.tls.keyFile }}" /tls-out/{{ .Values.tls.keyFile }}
              cp "$SRC/{{ .Values.tls.caFile }}" /tls-out/{{ .Values.tls.caFile }}
              chmod 400 /tls-out/{{ .Values.tls.certFile }} /tls-out/{{ .Values.tls.keyFile }} /tls-out/{{ .Values.tls.caFile }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: tls
              mountPath: /tls-out
            {{- $fullname := include "raft-kv.fullname" . }}
            {{- range $i := until (int .Values.replicaCount) }}
            - name: tls-{{ $i }}
              mountPath: /tls-in/{{ $fullname }}-{{ $i }}
              readOnly: true
            {{- end }}
      {{- end }}
      containers:
        - name: raft-kv
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- with .Values.gomemlimit }}
            - name: GOMEMLIMIT
              value: {{ . | quote }}
            {{- end }}
          # Every pod gets the SAME args. --id is the pod's stable name; --peers
          # is the whole-cluster list and the binary drops its own entry.
          args:
            - --id=$(POD_NAME)
            - --addr=0.0.0.0:{{ .Values.ports.client }}
            - --raft-addr=0.0.0.0:{{ .Values.ports.raft }}
            - --metrics-addr=0.0.0.0:{{ .Values.ports.metrics }}
            {{- with .Values.tracing.otlpEndpoint }}
            - --otlp-endpoint={{ . }}
            {{- end }}
            - --data=/data
            - --peers={{ include "raft-kv.peers" . }}
            {{- if .Values.tls.enabled }}
            - --raft-tls-cert={{ .Values.tls.mountPath }}/{{ .Values.tls.certFile }}
            - --raft-tls-key={{ .Values.tls.mountPath }}/{{ .Values.tls.keyFile }}
            - --raft-tls-ca={{ .Values.tls.mountPath }}/{{ .Values.tls.caFile }}
            {{- end }}
          ports:
            - name: client
              containerPort: {{ .Values.ports.client }}
            - name: raft
              containerPort: {{ .Values.ports.raft }}
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
          # /healthz = boot done / process alive (dumb). /readyz = Raft.Ready().
          startupProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
      {{- if .Values.tls.enabled }}
      volumes:
        - name: tls
          emptyDir: {}
        {{- $fullname := include "raft-kv.fullname" . }}
        {{- range $i := until (int .Values.replicaCount) }}
        - name: tls-{{ $i }}
          secret:
            secretName: {{ $fullname }}-{{ $i }}-tls
            # 0440 + pod fsGroup so non-root init/main can read (0400 is root-only).
            defaultMode: 0440
        {{- end }}
      {{- end }}
  # One PVC per pod, kept across reschedules — this is the "rejoins from its PVC"
  # half of the milestone.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
