# raft-kv on Kubernetes: a 3-node Raft cluster as a StatefulSet.
#
# Why StatefulSet, not Deployment: a consensus group needs *stable identity* and
# *stable per-member storage*. Each pod must keep the same name across reschedules
# (raft-kv-0 is always raft-kv-0, with the same DNS record) so peers can find it,
# and must reattach to the same WAL/snapshot PVC so it rejoins with its history
# rather than as a blank node. A Deployment gives neither — pods get random names
# and share no stable per-pod volume.
---
apiVersion: v1
kind: Service
metadata:
  name: raft-kv
  labels:
    app: raft-kv
spec:
  clusterIP: None # headless => one DNS A record per pod: raft-kv-<n>.raft-kv
  selector:
    app: raft-kv
  # Peers must resolve each other's DNS to hold the *first* election, which
  # happens before any pod is Ready. Without this, the cluster never bootstraps.
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: 8080
      targetPort: client
    - name: raft
      port: 9090
      targetPort: raft
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: raft-kv
  labels:
    app: raft-kv
spec:
  serviceName: raft-kv # must match the headless Service for stable per-pod DNS
  replicas: 3
  # Quorum needs the members up together; OrderedReady (the default) would block
  # pod-1 until pod-0 is Ready, but a lone pod-0 cannot reach quorum on its own.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: raft-kv
  template:
    metadata:
      labels:
        app: raft-kv
    spec:
      # The binary traps SIGTERM and steps down (graceful leader handoff), so a
      # short grace period is enough.
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532 # chowns the mounted PVC so the non-root uid can write it
      containers:
        - name: raft-kv
          image: raft-kv:dev
          imagePullPolicy: IfNotPresent # use the kind-loaded local image, never pull
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          # Every pod gets the SAME args. --id is the pod's stable name; --peers
          # lists all three members and the binary drops its own entry (a node is
          # never its own peer — quorum is sized as len(peers)+1).
          args:
            - --id=$(POD_NAME)
            - --addr=0.0.0.0:8080
            - --raft-addr=0.0.0.0:9090
            - --data=/data
            - --peers=raft-kv-0@raft-kv-0.raft-kv:9090@raft-kv-0.raft-kv:8080,raft-kv-1@raft-kv-1.raft-kv:9090@raft-kv-1.raft-kv:8080,raft-kv-2@raft-kv-2.raft-kv:9090@raft-kv-2.raft-kv:8080
          ports:
            - name: client
              containerPort: 8080
            - name: raft
              containerPort: 9090
          # Raft RPC up => the process is alive; client port up => it is serving.
          livenessProbe:
            tcpSocket:
              port: raft
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
  # One PVC per pod, kept across reschedules — this is the "rejoins from its PVC"
  # half of the milestone.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 256Mi
