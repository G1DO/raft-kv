name: gitleaks

# Secret-scanning gate (layer 1 of 2; layer 2 is the local pre-commit hook in
# .pre-commit-config.yaml). Scans the FULL git history and FAILS the build on any
# finding -- a secret that was ever committed is leaked even if a later commit
# removes it, so scanning only the latest diff isn't enough. Runs on every PR and
# on push to main. No path filter: a secret can land in any file.
#
# fetch-depth: 0 is required -- the default shallow checkout has a single commit,
# so there would be no history to scan.
#
# The gitleaks BINARY is pinned to the SAME version as the pre-commit hook so the
# two layers apply identical rules and can't disagree. Installed by release
# download (like helm.yml does for kubeconform) rather than gitleaks-action,
# which gates organisation use behind a licence key.

on:
  pull_request:
  push:
    branches: [main]

env:
  GITLEAKS_VERSION: 8.30.1

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for gitleaks

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: gitleaks git . --verbose --redact --no-banner
