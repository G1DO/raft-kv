name: image

# Builds the container image and PUBLISHES it to GHCR. This is the first link of
# the supply chain (build -> publish); signing (cosign), SBOM/provenance and the
# Trivy scan attach to this same image, by digest, in later work.
#
# Pull requests build but do NOT push — PR code must never write to the registry.
# So a PR proves the Dockerfile builds; the publish + GHCR auth first exercise on
# merge to main. There is deliberately no path filter on `push`: a tag release
# must build regardless of which files changed, and GitHub can't reliably mix
# `tags` with `paths`. PRs are path-filtered to the inputs that affect the image.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/image.yml"

env:
  IMAGE: ghcr.io/g1do/raft-kv

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR via GITHUB_TOKEN; no PAT needed
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      # Authenticate to GHCR. Skipped on PRs (nothing is pushed from a PR).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # sha-<short> always; branch name; pr-<n>; semver on tags; `latest` on the
      # default branch and on semver tags. Also emits OCI image labels.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Provenance/SBOM are produced deliberately in a later step (GitHub
          # attestation), not via BuildKit's default inline provenance — which
          # would add a confusing unknown/unknown manifest entry.
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: github.event_name != 'pull_request'
        run: echo "Published \`${IMAGE}\` @ \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
