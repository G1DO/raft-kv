name: image

# Builds the container image and PUBLISHES it to GHCR. This is the first link of
# the supply chain (build -> publish); signing (cosign), SBOM/provenance and the
# Trivy scan attach to this same image, by digest, in later work.
#
# Pull requests build but do NOT push — PR code must never write to the registry.
# So a PR proves the Dockerfile builds; the publish + GHCR auth first exercise on
# merge to main. There is deliberately no path filter on `push`: a tag release
# must build regardless of which files changed, and GitHub can't reliably mix
# `tags` with `paths`. PRs are path-filtered to the inputs that affect the image.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/image.yml"

env:
  # Fresh package name linked to this repo. The older ghcr.io/g1do/raft-kv package
  # became orphaned after a repo recreate (GITHUB_TOKEN → write_package denied).
  IMAGE: ghcr.io/g1do/raftkv

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR via GITHUB_TOKEN; no PAT needed
      id-token: write # OIDC token exchanged for a short-lived Fulcio signing cert (keyless)
      attestations: write # persist the provenance + SBOM attestations
      artifact-metadata: write # create the attestation storage record (required with push-to-registry)
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      # Authenticate to GHCR. Skipped on PRs (nothing is pushed from a PR).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # sha-<short> always; branch name; pr-<n>; semver on tags; `latest` on the
      # default branch and on semver tags. Also emits OCI image labels.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Provenance/SBOM are produced deliberately in the attest steps below
          # (GitHub attestation), not via BuildKit's default inline provenance —
          # which would add a confusing unknown/unknown manifest entry.
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The steps below sign and attest the image we just pushed, addressing it
      # BY DIGEST (steps.build.outputs.digest) so they bind to this exact build,
      # not a moving tag. All are gated to non-PR events — a PR builds but never
      # signs. Keyless throughout: the job's OIDC token (id-token: write) is
      # exchanged for a short-lived Fulcio cert and recorded in Rekor; no keys.

      # Pin the cosign version so the signature format matches what the README's
      # `cosign verify` documents — an unpinned installer can roll the default
      # forward to a release whose signatures an older verifier can't read.
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2 # no floating v4 tag upstream (only v4.x.y) — pin the patch
        with:
          cosign-release: v3.0.6

      # Sign keyless, by digest, reusing the login above — in BOTH cosign formats.
      # --use-signing-config=false: do NOT pull the TUF-provided signing config (cosign v3's
      #   default). That default broke the OCI sign path on 2026-06-27 ("must provide
      #   --new-bundle-format or --bundle ... with --signing-config", even with the flag set);
      #   =false uses cosign's built-in Fulcio/Rekor URLs — the behaviour that worked before.
      # --new-bundle-format: =true -> modern Sigstore bundle (read by `cosign verify`);
      #   =false -> a legacy `sha256-<digest>.sig` tag that admission controllers can verify.
      #   sigstore policy-controller (and Kyverno) do not yet verify bundle-format *signatures*
      #   — only attestations — so the in-cluster gate (deploy/policy/, ADR-006) relies on the
      #   legacy one. Drop the legacy call (and --use-signing-config=false) once upstream
      #   bundle-signature verification lands.
      - name: Sign image (keyless, both formats)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes --use-signing-config=false --new-bundle-format=true  "${IMAGE}@${{ steps.build.outputs.digest }}"
          cosign sign --yes --use-signing-config=false --new-bundle-format=false "${IMAGE}@${{ steps.build.outputs.digest }}"

      # SLSA provenance: a signed record of how/where this image was built.
      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # SPDX SBOM of the pushed image (pulled by digest from GHCR — needs the login above).
      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Summary
        if: github.event_name != 'pull_request'
        run: echo "Published \`${IMAGE}\` @ \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
