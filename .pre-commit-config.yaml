# Local secret-scanning hook -- layer 2 of 2; layer 1 is .github/workflows/gitleaks.yml.
# Runs gitleaks on STAGED changes before each commit is created, so a secret
# never enters history in the first place (the CI job is the backstop for when
# the hook isn't installed).
#
# One-time setup per clone:  pip install pre-commit && pre-commit install
# The rev is pinned to the SAME gitleaks version the CI job installs, so the
# local hook and CI apply identical rules.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
